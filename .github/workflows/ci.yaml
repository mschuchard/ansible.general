---
name: test

on:
  push:
    branches: [master]
    paths:
    - '**.py'
  pull_request:
    branches: [master]
    paths:
    - '**.py'

jobs:
  ansible-module-ci:
    runs-on: ubuntu-latest
    container: matthewschuchard/ansible-module
    steps:
    - name: setup ansible collection namespace dir structure
      run: mkdir -p ansible_collections/mschuchard
    - name: checkout
      uses: actions/checkout@v4
      with:
        path: ansible_collections/mschuchard/general
    - name: ruff
      run: ruff check .
      working-directory: ./ansible_collections/mschuchard/general
    - name: ty
      run: ty check plugins
      working-directory: ./ansible_collections/mschuchard/general
    - name: pytest module utils
      run: pytest tests/unit/plugins/module_utils
      working-directory: ./ansible_collections/mschuchard/general
